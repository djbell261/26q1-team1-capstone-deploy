server:
  port: 8099

spring:
  application:
    name: interviewprep

  datasource:
    url: jdbc:postgresql://localhost:5433/interviewprep
    username: postgres
    password: Noah2511

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# =========================
# JWT CONFIG
# =========================
jwt:
  secret: your_super_secret_key_which_should_be_long_and_secure
  expiration: 86400000 # 1 day in ms

# =========================
# OPENAI CONFIG
# =========================
openai:
  api-key: ${OPENAI_API_KEY:dummy-key}
  model: gpt-4.1-mini

# =========================
# EXTERNAL CODING API
# =========================
external:
  challenge:
    api:
      enabled: true
      base-url: https://leetcode-api-pied.vercel.app
      import-path: /problems
      api-key:
      api-host:

# =========================
# LOGGING (optional but helpful)
# =========================
logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE