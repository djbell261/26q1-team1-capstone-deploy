server:
  port: ${PORT:8080}

spring:
  application:
    name: interviewprep


  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/interviewprep}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:Noah2511}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: your_super_secret_key_which_should_be_long_and_secure
  expiration: 86400000

openai:
  api-key: ${OPENAI_API_KEY:dummy-key}
  model: gpt-4.1-mini

external:
  challenge:
    api:
      enabled: true
      base-url: https://leetcode-api-pied.vercel.app
      import-path: /problems
      api-key:
      api-host:

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE